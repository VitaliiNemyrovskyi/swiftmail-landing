name: Auto-publish blog post

# Runs on the self-hosted runner on the SwiftMail VPS. Originally used a
# local Ollama container (decommissioned 2026-05-08); now uses Groq cloud
# (LLM_PROVIDER=groq env on prod), which is 50-300× faster and free up
# to 14 400 RPD per model. The pipeline supports both back-ends — switch
# by setting LLM_PROVIDER in /home/deploy/swiftmail-landing/content-pipeline/.env.
#
# After this workflow pushes to main, deploy.yml fires and Cloudflare Pages
# picks up the new article.

on:
  schedule:
    # 05:00 UTC = 07:00 CEST (summer) / 06:00 CET (winter).
    # Slightly later than overnight DB jobs so OOM killer doesn't fire.
    - cron: '0 5 * * *'

  workflow_dispatch:
    inputs:
      langs:
        # UK was dropped from default 2026-05-08 — translation quality not
        # acceptable (see Revert commit 5a4ac08), and there's no `uk/blog/`
        # destination folder, so leaving it default crashed publish.mjs on
        # path creation. Manual dispatch can still pass `langs: es,fr,de,pt,uk`
        # if the UK quality bar is ever re-met.
        description: 'Comma-separated languages to translate (default: es,fr,de,pt)'
        required: false
        default: 'es,fr,de,pt'
      en_only:
        description: 'EN only — skip translations'
        type: boolean
        required: false
        default: false
      dry_run:
        description: 'Dry run — generate + check, no publish or push'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

# Never overlap two auto-publish runs (also: in-code lock file in logs/)
concurrency:
  group: auto-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, swiftmail]
    timeout-minutes: 240   # 4h ceiling — draft ~25min, translate ~30min/lang × 4 langs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need git log/history for the publish step to compose decent commit msg.
          fetch-depth: 50

      - name: Setup PATH for nvm node
        run: |
          # systemd-spawned runner has minimal PATH; nvm bin is not in it.
          NODE_BIN="$HOME/.nvm/versions/node/v22.22.2/bin"
          if [ -d "$NODE_BIN" ]; then
            echo "$NODE_BIN" >> "$GITHUB_PATH"
            echo "node version: $($NODE_BIN/node -v)"
          else
            echo "::error::nvm node not found at $NODE_BIN"
            exit 1
          fi

      - name: Stage pipeline .env from server canonical copy
        run: |
          # Secrets (SMTP, PEXELS_API_KEY, GROQ_API_KEY, GEMINI_API_KEY,
          # LLM_PROVIDER) live in the operator's .env at
          # /home/deploy/swiftmail-landing/content-pipeline/.env. We re-use
          # it instead of mirroring 10+ secrets into Actions secrets.
          SRC="/home/deploy/swiftmail-landing/content-pipeline/.env"
          DST="content-pipeline/.env"
          if [ ! -f "$SRC" ]; then
            echo "::error::canonical .env missing at $SRC — cannot proceed"
            exit 1
          fi
          cp "$SRC" "$DST"
          echo "env-copied ($(wc -l < $DST) lines)"

      - name: Verify at least one provider reachable
        # Pipeline now uses a fallback chain (LLM_PROVIDER_CHAIN) instead
        # of a single LLM_PROVIDER. We just need ONE provider in the chain
        # to be up — others can be down (rate-limited, key invalid, etc.)
        # and the pipeline will gracefully fall through to next.
        # If a chain isn't set, fall back to the legacy single-provider
        # check.
        working-directory: content-pipeline
        run: |
          set -a; . ./.env; set +a
          CHAIN="${LLM_PROVIDER_CHAIN:-${LLM_PROVIDER:-ollama}}"
          echo "provider chain: $CHAIN"

          check_provider() {
            local p="$1"
            case "$p" in
              groq)
                curl -sf -H "Authorization: Bearer $GROQ_API_KEY" \
                  https://api.groq.com/openai/v1/models -o /dev/null
                ;;
              glm)
                local base="${GLM_BASE_URL:-https://api.z.ai/api/paas/v4}"
                curl -sf -H "Authorization: Bearer $GLM_API_KEY" \
                  "$base/models" -o /dev/null
                ;;
              gemini)
                curl -sf -H "x-goog-api-key: $GEMINI_API_KEY" \
                  https://generativelanguage.googleapis.com/v1beta/models -o /dev/null
                ;;
              ollama)
                curl -sf "${OLLAMA_URL:-http://localhost:11434}/api/tags" -o /dev/null
                ;;
              *)
                return 1
                ;;
            esac
          }

          ok_count=0
          IFS=',' read -ra PROVIDERS <<< "$CHAIN"
          for p in "${PROVIDERS[@]}"; do
            p="$(echo "$p" | tr -d ' ')"
            if check_provider "$p"; then
              echo "  ✓ $p"
              ok_count=$((ok_count + 1))
            else
              echo "  ✗ $p (down or key invalid)"
            fi
          done

          if [ "$ok_count" -eq 0 ]; then
            echo "::error::no providers reachable. Pipeline cannot draft."
            exit 1
          fi
          echo "$ok_count provider(s) up — pipeline can run with fallback."

      - name: Install pipeline dependencies
        working-directory: content-pipeline
        run: |
          # Fresh checkout each run — node_modules absent. pnpm uses the host's
          # content-addressed store, so after first run installs are ~5s hardlinks.
          if ! command -v pnpm >/dev/null 2>&1; then
            corepack enable && corepack prepare pnpm@latest --activate
          fi
          pnpm install --frozen-lockfile --prefer-offline
          echo "deps-installed"

      - name: Run auto-publish
        working-directory: content-pipeline
        env:
          PIPELINE_GIT_NAME: 'SwiftMail Pipeline'
          PIPELINE_GIT_EMAIL: 'pipeline@swift-mail.app'
        run: |
          ARGS=""
          if [ "${{ inputs.en_only }}" = "true" ]; then ARGS="$ARGS --en-only"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.langs }}" ] && [ "${{ inputs.en_only }}" != "true" ]; then
            ARGS="$ARGS --langs=${{ inputs.langs }}"
          fi
          echo "Running: node auto-publish.mjs $ARGS"
          node --env-file-if-exists=.env auto-publish.mjs $ARGS

      - name: Push to main (uses workflow GITHUB_TOKEN auth)
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          # publish.mjs does `git push origin main` — but that runs inside the
          # script's own subprocess and may have inherited the wrong remote URL
          # if the runner workdir was set up with a different origin. Belt+suspenders:
          # ensure remote is the BoberFamily HTTPS URL (actions/checkout auth)
          # and re-push if anything ahead of origin/main.
          git remote set-url origin "https://github.com/BoberFamily/swiftmail-landing.git"
          if [ -n "$(git log origin/main..HEAD --oneline 2>/dev/null)" ]; then
            git push origin main
          else
            echo "Nothing to push — working tree at origin/main"
          fi

      - name: Trigger Cloudflare Pages deploy
        # Pipeline pushes via GITHUB_TOKEN, which by GHA design does NOT
        # fire push-event workflows (loop-prevention). Without this step
        # CF Pages stays idle and the new article never goes live until
        # someone manually pushes a commit. We trigger deploy.yml via
        # workflow_dispatch from here — that runs as a separate workflow
        # and DOES fire the deploy.
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh workflow run deploy.yml --repo BoberFamily/swiftmail-landing --ref main \
              && echo "deploy triggered via workflow_dispatch" \
              || echo "::warning::deploy trigger failed — run gh workflow run deploy.yml manually"
          else
            echo "::warning::gh CLI not available on runner — deploy not auto-triggered. Run: gh workflow run deploy.yml --repo BoberFamily/swiftmail-landing"
          fi

      - name: Cleanup .env (don't leave secrets in runner workdir)
        if: always()
        run: |
          rm -f content-pipeline/.env
          echo "env-cleared"
