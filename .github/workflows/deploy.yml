name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Manual trigger — needed because pushes from auto-publish.yml use the
  # workflow's GITHUB_TOKEN, which by GHA design does NOT trigger
  # downstream push-event workflows (loop-prevention safety). So when
  # the pipeline pushes a new article, deploy.yml stays idle. With
  # workflow_dispatch we can trigger it via:
  #   gh workflow run deploy.yml --repo BoberFamily/swiftmail-landing
  # …or have auto-publish.yml call this workflow at the end (followup).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name swift-mail
